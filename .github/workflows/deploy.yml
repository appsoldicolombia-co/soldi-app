name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Verificar secret
        env:
          SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SODI_8B6D2 }}
        run: |
          if [ -z "$SA" ]; then
            echo "❌ El secret FIREBASE_SERVICE_ACCOUNT_SODI_8B6D2 está VACÍO o no existe en este repo"
            exit 1
          fi
          CHARS=$(echo -n "$SA" | wc -c)
          echo "✅ Secret encontrado — $CHARS caracteres"
          # Verificar que es JSON válido
          if echo "$SA" | python3 -c "import sys,json; json.load(sys.stdin)" 2>/dev/null; then
            echo "✅ El JSON es válido"
          else
            echo "❌ El contenido NO es JSON válido — verifica que copiaste todo el archivo .json"
            exit 1
          fi

      - name: Instalar dependencias
        run: npm ci

      - name: Build
        run: npm run build

      - name: Autenticar con Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SODI_8B6D2 }}

      - name: Deploy a Firebase Hosting
        run: npx firebase-tools@latest deploy --only hosting --project sodi-8b6d2 --non-interactive
